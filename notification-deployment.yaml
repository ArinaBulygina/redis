apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification_service:latest
          imagePullPolicy: Never

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f app.py"
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f app.py"
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3