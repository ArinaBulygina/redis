apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order_service:latest
          imagePullPolicy: Never

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f app.py"
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2